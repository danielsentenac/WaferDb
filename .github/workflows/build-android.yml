name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      api_base:
        description: 'WAFERDB_API_BASE URL (leave blank for default)'
        required: false
        default: ''
      darkfield_root:
        description: 'WAFERDB_DARKFIELD_ROOT path (leave blank for default)'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        working-directory: waferdb_app
        run: flutter pub get

      - name: Build APK
        working-directory: waferdb_app
        run: |
          API_BASE="${{ inputs.api_base }}"
          if [ -z "$API_BASE" ]; then API_BASE="${{ vars.WAFERDB_API_BASE }}"; fi
          if [ -z "$API_BASE" ]; then API_BASE="http://127.0.0.1:8081/WaferDb/api"; fi
          DARKFIELD_ROOT="${{ inputs.darkfield_root }}"
          if [ -z "$DARKFIELD_ROOT" ]; then DARKFIELD_ROOT="${{ vars.WAFERDB_DARKFIELD_ROOT }}"; fi
          if [ -z "$DARKFIELD_ROOT" ]; then DARKFIELD_ROOT="data/darkfield"; fi
          flutter build apk --release \
            "--dart-define=WAFERDB_API_BASE=$API_BASE" \
            "--dart-define=WAFERDB_DARKFIELD_ROOT=$DARKFIELD_ROOT"

      - name: Get app version
        id: version
        working-directory: waferdb_app
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: *//;s/+.*//')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Rename APK
        run: |
          mv waferdb_app/build/app/outputs/flutter-apk/app-release.apk \
             waferdb_app/build/app/outputs/flutter-apk/waferdb-${{ steps.version.outputs.version }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: waferdb-android-apk
          path: waferdb_app/build/app/outputs/flutter-apk/waferdb-*.apk
          if-no-files-found: error
