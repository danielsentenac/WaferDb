<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WaferDb Backend</title>
    <style>
        body {
            margin: 0;
            font-family: "DejaVu Serif", serif;
            background: linear-gradient(160deg, #e9efe9 0%, #f7f5ef 55%, #d6e2e0 100%);
            color: #1f2a2a;
        }
        main {
            max-width: 760px;

        }
        h1 {
            margin-top: 0;
            font-size: 2.4rem;
        }
        code {
            padding: 0.15rem 0.35rem;
            border-radius: 6px;
            background: #edf1ef;
        }

<main>
    <h1>WaferDb Backend</h1>

    <p>Health check: <code>/api/health</code></p>
